<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>54期男1組 · 報到系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #C4964A;
  --gold-pale: #F9F3E8;
  --ink: #1C1410;
  --ink-soft: #8A7A6E;
  --paper: #FBF7F0;
  --paper-dark: #F0E8D8;
  --teal: #1A6B5A;
  --teal-light: #E0F0EC;
  --border: rgba(196,150,74,0.22);
  --radius: 12px;
  --shadow: 0 2px 12px rgba(28,20,16,0.06);
}

body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  max-width: 480px;
  margin: 0 auto;
}

/* 桌機底色填滿 */
html {
  background: #e8e0d4;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 15% 10%, rgba(196,150,74,0.06) 0%, transparent 55%),
              radial-gradient(ellipse 50% 70% at 85% 85%, rgba(26,107,90,0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.screen { display: none; min-height: 100vh; position: relative; z-index: 1; padding: 2.5rem 1.2rem; }
.screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* ─── 標題區 ─── */
.header {
  text-align: center;
  margin-bottom: 2rem;
}

.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 0.6rem;
  font-size: 52px;
  line-height: 1;
  background: none;
  border: none;
  box-shadow: none;
  width: auto; height: auto;
}

.title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(20px, 5vw, 26px);
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 12px;
  color: var(--ink-soft);
  letter-spacing: 0.06em;
}

/* ─── 卡片 ─── */
.card {
  background: rgba(255,255,255,0.92);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  width: 100%;
  max-width: 100%;
  padding: 1.8rem 1.4rem;
}

.card-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 1.3rem;
  text-align: center;
  letter-spacing: 0.05em;
}

/* ─── 表單 ─── */
.field {
  margin-bottom: 1.2rem;
}

.field:last-child {
  margin-bottom: 0;
}

label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-mid);
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}

input, select, textarea {
  width: 100%;
  padding: 11px 13px;
  border: 1px solid rgba(196,150,74,0.3);
  border-radius: 8px;
  font-size: 14px;
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--ink);
  background: rgba(251,247,240,0.6);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  -webkit-appearance: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(196,150,74,0.1);
  background: #fff;
}

input::placeholder {
  color: var(--ink-soft);
  opacity: 0.6;
}

/* ─── 按鈕 ─── */
.btn {
  width: 100%;
  padding: 15px 20px;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  font-weight: 500;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-primary {
  background: linear-gradient(135deg, #C4964A 0%, #A07835 100%);
  color: #fff;
  box-shadow: 0 2px 10px rgba(196,150,74,0.28);
}

.btn-primary:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(196,150,74,0.36);
}

.btn-primary:active:not(:disabled) {
  transform: translateY(0);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--ink);
  margin-top: 0.8rem;
}

.btn-secondary:hover {
  background: var(--gold-pale);
  border-color: rgba(196,150,74,0.4);
}

.btn-teal {
  background: linear-gradient(135deg, #1A6B5A 0%, #145248 100%);
  color: #fff;
  box-shadow: 0 2px 10px rgba(26,107,90,0.24);
  margin-top: 1rem;
}

.btn-teal:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(26,107,90,0.32);
}

/* ─── 訊息 ─── */
.msg {
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.5;
  margin-top: 1rem;
  display: none;
}

.msg.show { display: block; }

.msg-error {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  color: #991B1B;
}

.msg-success {
  background: #F0FDF4;
  border: 1px solid #BBFBDF;
  color: #166534;
}

.msg-info {
  background: #EFF6FF;
  border: 1px solid #BFDBFE;
  color: #1E40AF;
}

/* ─── 加載動畫 ─── */
.spinner {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ─── AI 狀態列 ─── */
.ai-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--ink-soft);
  margin-bottom: 0.8rem;
  padding: 8px 12px;
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: fit-content;
  margin-left: auto;
  margin-right: auto;
}

.ai-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #9ca3af;
  flex-shrink: 0;
  transition: background 0.3s;
}

.ai-dot.connecting {
  background: var(--gold);
  animation: pulse 1s ease-in-out infinite;
}

.ai-dot.connected {
  background: #22c55e;
}

.ai-dot.error {
  background: #ef4444;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}

/* ─── 聊天介面 ─── */
.chat-container {
  width: 100%;
  max-width: 380px;
  height: 420px;
  background: rgba(255,255,255,0.92);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1.2rem;
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.chat-msg {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}

.chat-msg.user {
  justify-content: flex-end;
}

.chat-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 500;
  flex-shrink: 0;
}

.chat-msg.user .chat-avatar {
  background: var(--gold-pale);
  color: var(--ink);
  order: 2;
}

.chat-msg.ai .chat-avatar {
  background: var(--teal-light);
  color: var(--teal);
}

.chat-bubble {
  max-width: 220px;
  padding: 10px 13px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.5;
}

.chat-msg.user .chat-bubble {
  background: linear-gradient(135deg, #C4964A 0%, #A07835 100%);
  color: #fff;
  border-radius: 10px 4px 10px 10px;
  order: 1;
}

.chat-msg.ai .chat-bubble {
  background: var(--teal-light);
  color: var(--teal);
  border-radius: 4px 10px 10px 10px;
}

.chat-input-area {
  border-top: 1px solid var(--border);
  padding: 1rem;
  display: flex;
  gap: 8px;
}

.chat-input {
  flex: 1;
  padding: 9px 12px;
  border: 1px solid rgba(196,150,74,0.3);
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}

.chat-input:focus {
  border-color: var(--gold);
}

.chat-send {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #C4964A 0%, #A07835 100%);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
}

.chat-send:hover:not(:disabled) {
  transform: translateY(-1px);
}

.chat-send:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ─── 管理後台 ─── */
.admin-stats {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1rem;
  margin-bottom: 1.5rem;
}

.stat-box {
  background: var(--gold-pale);
  border: 1px solid rgba(196,150,74,0.3);
  border-radius: 10px;
  padding: 1rem;
  text-align: center;
}

.stat-number {
  font-size: 24px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 4px;
}

.stat-label {
  font-size: 11px;
  color: var(--ink-soft);
  letter-spacing: 0.05em;
}

.student-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.8rem;
  margin-top: 1.2rem;
}

.student-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.8rem;
  text-align: center;
  cursor: default;
  transition: all 0.2s;
}

.student-card.checked-in {
  background: var(--teal-light);
  border-color: rgba(26,107,90,0.3);
}

.student-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
}

.student-dharma {
  font-size: 11px;
  color: var(--ink-soft);
  margin-bottom: 4px;
}

.student-status {
  font-size: 11px;
  color: var(--teal);
  font-weight: 500;
}

.student-card:not(.checked-in) .student-status {
  color: #9ca3af;
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════ -->
<!-- 首頁 -->
<!-- ═══════════════════════════════════════ -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div class="logo" style="font-size:56px; margin-bottom:0.3rem;">🍀</div>
    <h1 class="title">54期男1組</h1>
  </div>

  <!-- 統計列 -->
  <div id="home-stats" style="display:flex; gap:10px; width:100%; margin-bottom:1rem;">
    <div style="flex:1; background:rgba(26,107,90,0.1); border-radius:10px; padding:12px 8px; text-align:center;">
      <div id="hs-attend" style="font-size:26px; font-weight:700; color:var(--teal);">--</div>
      <div style="font-size:12px; color:var(--ink-soft); margin-top:2px;">出席</div>
    </div>
    <div style="flex:1; background:rgba(196,150,74,0.12); border-radius:10px; padding:12px 8px; text-align:center;">
      <div id="hs-leave" style="font-size:26px; font-weight:700; color:var(--gold);">--</div>
      <div style="font-size:12px; color:var(--ink-soft); margin-top:2px;">請假</div>
    </div>
    <div style="flex:1; background:rgba(156,163,175,0.15); border-radius:10px; padding:12px 8px; text-align:center;">
      <div id="hs-pending" style="font-size:26px; font-weight:700; color:#9ca3af;">--</div>
      <div style="font-size:12px; color:var(--ink-soft); margin-top:2px;">未回報</div>
    </div>
  </div>
  <div style="font-size:11px; color:var(--ink-soft); margin-bottom:1rem; text-align:center;">共 17 人</div>

  <div class="card">
    <div class="card-title">報到系統</div>
    
    <div class="field">
      <label style="font-size:14px; color:var(--ink); font-weight:600; letter-spacing:0.06em;">登入碼：手機後四碼</label>
      <input type="password" id="login-code" placeholder="••••" maxlength="4" inputmode="numeric" pattern="[0-9]*" style="font-size:24px; letter-spacing:0.3em; text-align:center;" onkeydown="if(event.key==='Enter') handleStudentLogin()">
    </div>

    <button class="btn btn-primary" onclick="handleStudentLogin()">
      登入
    </button>

    <div style="text-align:center; margin-top: 1.2rem;">
      <a href="#" onclick="showScreen('screen-admin-login'); return false;" style="font-size:12px; color: var(--ink-soft); text-decoration: none; letter-spacing:0.05em;">學長專區</a>
    </div>

    <div id="home-error" class="msg msg-error"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════ -->
<!-- 學員報到 -->
<!-- ═══════════════════════════════════════ -->
<div id="screen-checkin" class="screen">
  <div class="header">
    <div class="logo">🍀</div>
    <h1 class="title">學員報到</h1>
    <div id="student-display" style="font-size: clamp(22px, 6vw, 30px); font-family: 'Noto Serif TC', serif; font-weight: 600; color: var(--ink); letter-spacing: 0.1em; margin-top: 0.4rem;"></div>
  </div>

  <div class="card">
    <div id="checkin-form" style="display: block;">
      <div class="field">
        <label>出席狀態</label>
        <div style="display: flex; gap: 12px; margin-top: 4px;">
          <button type="button" id="btn-attend" onclick="selectStatus('出席')" style="flex:1; padding: 14px; border-radius: 10px; border: 2px solid var(--border); background: #fff; font-size: 16px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; transition: all 0.2s; color: var(--ink);">
            ✓ 出席
          </button>
          <button type="button" id="btn-absent" onclick="selectStatus('請假')" style="flex:1; padding: 14px; border-radius: 10px; border: 2px solid var(--border); background: #fff; font-size: 16px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; transition: all 0.2s; color: var(--ink);">
            ✗ 請假
          </button>
        </div>
        <input type="hidden" id="session-select" value="">
      </div>

      <div class="field" id="absence-reason-field" style="display:none;">
        <label>請假事由</label>
        <textarea id="absence-reason" rows="3" placeholder="請填寫請假事由"></textarea>
      </div>

      <button class="btn btn-primary" onclick="handleCheckin()">
        確認送出
      </button>

      <button class="btn btn-secondary" onclick="showScreen('screen-home')">
        回首頁
      </button>

      <div id="checkin-error" class="msg msg-error"></div>
      <div id="checkin-success" class="msg msg-success"></div>
    </div>

    <div id="checkin-result" style="display: none;">
      <div style="text-align: center; margin-bottom: 1.2rem;">
        <div style="font-size: 48px; margin-bottom: 0.8rem;">✓</div>
        <div style="font-size: 13px; color: var(--ink-soft); line-height: 1.6;">
          報到成功！已將紀錄送到 Google Sheets
        </div>
      </div>

      <!-- AI 狀態列 -->
      <div class="ai-status" id="ai-status">
        <div class="ai-dot" id="ai-dot"></div>
        <span id="ai-status-text">等待 AI 連線</span>
      </div>

      <!-- AI 回饋區 -->
      <div id="feedback-box" style="background: var(--teal-light); border-radius: 10px; padding: 1rem; margin-bottom: 1.2rem; font-size: 13px; line-height: 1.6; display: none;">
        <div style="color: var(--teal); font-weight: 500; margin-bottom: 0.6rem;">✨ AI 關懷回饋</div>
        <div id="feedback-text"></div>
      </div>

      <button class="btn btn-primary" onclick="doAnotherCheckin()">
        下一位報到
      </button>

      <button class="btn btn-secondary" onclick="showScreen('screen-home')">
        回首頁
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════ -->
<!-- 學長登入 -->
<!-- ═══════════════════════════════════════ -->
<div id="screen-admin-login" class="screen">
  <div class="header">
    <div class="logo">👑</div>
    <h1 class="title">學長專區</h1>
    <p class="subtitle">進入管理面板</p>
  </div>

  <div class="card">
    <div class="field">
      <label>請輸入密碼</label>
      <input type="password" id="admin-pwd" placeholder="輸入密碼" onkeydown="if(event.key==='Enter') handleAdminLogin()">
    </div>

    <button class="btn btn-primary" onclick="handleAdminLogin()">
      進入後台
    </button>

    <button class="btn btn-secondary" onclick="showScreen('screen-home')">
      取消
    </button>

    <div id="admin-login-error" class="msg msg-error"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════ -->
<!-- 管理面板 -->
<!-- ═══════════════════════════════════════ -->
<div id="screen-admin" class="screen">
  <div class="header">
    <h1 class="title">報到統計</h1>
    <p class="subtitle" id="admin-date">加載中...</p>
  </div>

  <div class="card">
    <div class="admin-stats">
      <div class="stat-box">
        <div class="stat-number" id="stat-total">--</div>
        <div class="stat-label">總人數</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="stat-checkedin">--</div>
        <div class="stat-label">已報到</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="stat-pending">--</div>
        <div class="stat-label">未報到</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="stat-rate">--%</div>
        <div class="stat-label">報到率</div>
      </div>
    </div>

    <div style="font-size: 12px; color: var(--ink-soft); font-weight: 500; margin-top: 1.5rem; margin-bottom: 0.8rem; letter-spacing: 0.05em;">學員狀態</div>
    <div id="student-grid" class="student-grid"></div>

    <button class="btn btn-teal" onclick="refreshAdminData()">
      重新整理
    </button>

    <button class="btn btn-secondary" onclick="doAdminLogout()">
      登出
    </button>
  </div>
</div>

<script>
// ════════════════════════════════════════════
// 配置
// ════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxfkzOF5CGRVw7QPWAEZZRKgp_EUyFXdrDrwv5nNydCTZOkSvHWy0vHSzu7uz5YJCs6-Q/exec'; // 在此填入你的GAS部署網址
let students = [];
let checkinLog = [];
let currentStudent = null;
let chatHistory = [];

// ════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════
async function init() {
  try {
    const resp = await fetch(GAS_URL + '?action=getStudents');
    const data = await resp.json();
    if (data.success) {
      students = data.data;
    }
  } catch(e) {
    console.log('GAS 離線模式');
    // 離線時使用測試數據
    students = [
      { id: 'A001', name: '淨心', dharma_name: '常願', background: '工程師', progress: '進行中', senior_note: '' },
      { id: 'A002', name: '明德', dharma_name: '常智', background: '教師', progress: '進行中', senior_note: '' },
      { id: 'A003', name: '智能', dharma_name: '常傳', background: '商人', progress: '進行中', senior_note: '' }
    ];
  }
  updateHomeStats();
}

function updateHomeStats() {
  const total = 17;
  const attendIds = new Set(checkinLog.filter(l => l.session === '出席').map(l => l.studentId));
  const leaveIds  = new Set(checkinLog.filter(l => l.session === '請假').map(l => l.studentId));
  const checkedIds = new Set(checkinLog.map(l => l.studentId));
  const pending = total - checkedIds.size;
  const el_a = document.getElementById('hs-attend');
  const el_l = document.getElementById('hs-leave');
  const el_p = document.getElementById('hs-pending');
  if (el_a) el_a.textContent = attendIds.size;
  if (el_l) el_l.textContent = leaveIds.size;
  if (el_p) el_p.textContent = pending < 0 ? 0 : pending;
}

init();

// ════════════════════════════════════════════
// 螢幕導航
// ════════════════════════════════════════════
function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  const screen = document.getElementById(screenId);
  if (screen) screen.classList.add('active');
}

function hideMsg(msgId) {
  const el = document.getElementById(msgId);
  if (el) el.classList.remove('show');
}

function showError(msgId, text) {
  const el = document.getElementById(msgId);
  if (el) {
    el.textContent = text;
    el.classList.add('show');
  }
}

// ════════════════════════════════════════════
// 學員報到流程
// ════════════════════════════════════════════
function handleStudentLogin() {
  hideMsg('home-error');
  const code = (document.getElementById('login-code').value || '').trim();
  if (!code) {
    showError('home-error', '請輸入登入碼');
    return;
  }

  const student = students.find(s => String(s.id).trim() === code);
  if (!student) {
    showError('home-error', '查無此登入碼，請確認');
    return;
  }

  currentStudent = student;
  chatHistory = [];
  document.getElementById('student-display').textContent = `${student.name}　${student.dharma_name || ''}`;
  document.getElementById('session-select').value = ''; resetSessionButtons();
  document.getElementById('btn-attend').style.cssText = 'flex:1; padding:14px; border-radius:10px; border:2px solid var(--border); background:#fff; font-size:16px; font-family:"Noto Sans TC",sans-serif; cursor:pointer; transition:all 0.2s; color:var(--ink);';
  document.getElementById('btn-absent').style.cssText = 'flex:1; padding:14px; border-radius:10px; border:2px solid var(--border); background:#fff; font-size:16px; font-family:"Noto Sans TC",sans-serif; cursor:pointer; transition:all 0.2s; color:var(--ink);';
  document.getElementById('absence-reason-field').style.display = 'none';
  document.getElementById('absence-reason').value = '';
  document.getElementById('checkin-form').style.display = 'block';
  document.getElementById('checkin-result').style.display = 'none';
  hideMsg('checkin-error');
  hideMsg('checkin-success');
  showScreen('screen-checkin');
}

function setAiStatus(state, text) {
  const dot = document.getElementById('ai-dot');
  const label = document.getElementById('ai-status-text');
  if (!dot || !label) return;
  dot.className = 'ai-dot ' + state;
  label.textContent = text;
}

function selectStatus(val) {
  document.getElementById('session-select').value = val;
  const btnAttend = document.getElementById('btn-attend');
  const btnAbsent = document.getElementById('btn-absent');
  if (val === '出席') {
    btnAttend.style.background = 'var(--teal-light)';
    btnAttend.style.borderColor = 'var(--teal)';
    btnAttend.style.color = 'var(--teal)';
    btnAttend.style.fontWeight = '600';
    btnAbsent.style.background = '#fff';
    btnAbsent.style.borderColor = 'var(--border)';
    btnAbsent.style.color = 'var(--ink)';
    btnAbsent.style.fontWeight = '400';
  } else {
    btnAbsent.style.background = '#FEF2F2';
    btnAbsent.style.borderColor = '#FECACA';
    btnAbsent.style.color = '#991B1B';
    btnAbsent.style.fontWeight = '600';
    btnAttend.style.background = '#fff';
    btnAttend.style.borderColor = 'var(--border)';
    btnAttend.style.color = 'var(--ink)';
    btnAttend.style.fontWeight = '400';
  }
  document.getElementById('absence-reason-field').style.display = val === '請假' ? 'block' : 'none';
}

function toggleAbsenceReason() {}

async function handleCheckin() {
  hideMsg('checkin-error');
  const status = (document.getElementById('session-select').value || '').trim();
  if (!status) {
    showError('checkin-error', '請選擇出席狀態');
    return;
  }
  const reason = status === '請假'
    ? (document.getElementById('absence-reason').value || '').trim()
    : '';
  if (status === '請假' && !reason) {
    showError('checkin-error', '請填寫請假事由');
    return;
  }

  const btn = event.target;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const time = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    // 記錄到本地
    checkinLog.push({
      studentId: currentStudent.id,
      name: currentStudent.name,
      dharma: currentStudent.dharma_name,
      session: status,
      time
    });
    updateHomeStats();

    // 送到GAS
    await fetch(GAS_URL + '?action=checkin' +
      '&name=' + encodeURIComponent(currentStudent.name) +
      '&dharma=' + encodeURIComponent(currentStudent.dharma_name || '') +
      '&session=' + encodeURIComponent(status) +
      '&feedback=' + encodeURIComponent(reason)
    ).catch(() => {});

    // 顯示成功畫面
    document.getElementById('checkin-form').style.display = 'none';
    document.getElementById('checkin-result').style.display = 'block';
    document.getElementById('feedback-box').style.display = 'none';

    // AI 狀態：連線中
    setAiStatus('connecting', 'AI 連線中...');

    // 透過 GAS 呼叫 AI 回饋
    try {
      const aiResp = await fetch(GAS_URL +
        '?action=generateFeedback' +
        '&student=' + encodeURIComponent(JSON.stringify(currentStudent)) +
        '&session=' + encodeURIComponent(status)
      );
      const aiData = await aiResp.json();
      if (!aiData.success) throw new Error(aiData.error);
      const feedback = aiData.data;

      document.getElementById('feedback-text').innerHTML = `
        <div style="margin-bottom: 0.6rem;">${feedback.welcome}</div>
        <div style="margin-bottom: 0.6rem;">${feedback.progress}</div>
        <div>${feedback.practice}</div>
      `;
      document.getElementById('feedback-box').style.display = 'block';
      setAiStatus('connected', 'AI 已連線');
    } catch(e) {
      setAiStatus('error', 'AI 無法連線');
      console.error('AI 回饋錯誤：', e);
    }

  } catch(e) {
    showError('checkin-error', '送出失敗，請重試');
  } finally {
    btn.disabled = false;
    btn.textContent = '確認送出';
  }
}

function doAnotherCheckin() {
  currentStudent = null;
  chatHistory = [];
  document.getElementById('login-code').value = '';
  showScreen('screen-home');
}

// ════════════════════════════════════════════
// 學長管理
// ════════════════════════════════════════════
function handleAdminLogin() {
  hideMsg('admin-login-error');
  const pwd = (document.getElementById('admin-pwd').value || '').trim();
  if (pwd !== '7777') {
    showError('admin-login-error', '密碼不正確');
    return;
  }

  document.getElementById('admin-pwd').value = '';
  refreshAdminData();
  showScreen('screen-admin');
}

async function refreshAdminData() {
  try {
    const resp = await fetch(GAS_URL + '?action=getStudents');
    const data = await resp.json();
    if (data.success) {
      students = data.data;
    }
  } catch(e) {}

  renderAdmin();
}

function renderAdmin() {
  const now = new Date();
  document.getElementById('admin-date').textContent = now.toLocaleString('zh-TW', {
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    weekday: 'short',
    hour: '2-digit',
    minute: '2-digit'
  });

  const checkedIds = new Set(checkinLog.map(l => l.studentId));
  const total = students.length;
  const checked = checkedIds.size;
  const rate = total > 0 ? Math.round(checked / total * 100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-checkedin').textContent = checked;
  document.getElementById('stat-pending').textContent = total - checked;
  document.getElementById('stat-rate').textContent = rate + '%';

  const grid = document.getElementById('student-grid');
  grid.innerHTML = '';
  students.forEach(s => {
    const isChecked = checkedIds.has(s.id);
    const div = document.createElement('div');
    div.className = 'student-card' + (isChecked ? ' checked-in' : '');
    div.innerHTML = `
      <div class="student-name">${s.name}</div>
      ${s.dharma_name ? `<div class="student-dharma">${s.dharma_name}</div>` : ''}
      <div class="student-status">${isChecked ? '✓ 已報到' : '未報到'}</div>
    `;
    grid.appendChild(div);
  });
}

function doAdminLogout() {
  showScreen('screen-home');
}
